# configs/default.yaml

network:
  N: 50
  radius: 0.30
  seed: 42

signal:
  T: 300
  type: sinusoid
  noise_std: 0.05

faults:
  fault_fraction: 0.20
  fault_type: stuck
  fault_onset: 50
  drift_rate: 0.04
  burst_std: 2.0

fusion:
  alpha: 0.85
  beta: 2.0
  lag: 10
  n_iter: 40
  trim: 0.10
  k_threshold: 1.5

detection:
  cusum_slack: 0.08
  cusum_threshold: 1.5
  ewma_lambda: 0.20
  ewma_L: 3.0

heterogeneous_noise:
  base_std: 0.05
  high_std: 0.45
  noisy_fractions: [0.0, 0.10, 0.20, 0.30, 0.40, 0.50]

sweeps:
  fault_fractions:  [0.05, 0.10, 0.20, 0.30, 0.40]
  fault_types:      [stuck, drift, malicious, noise_burst]
  alphas:           [0.0, 0.3, 0.5, 0.7, 0.80, 0.85, 0.90, 0.95, 0.99]
  betas:            [0.5, 1.0, 2.0, 3.0, 4.0]
  lags:             [5, 10, 15, 20, 25]
  n_iter_vals:      [5, 10, 20, 30, 40, 60, 80]
  N_values:         [10, 20, 30, 40, 50]
  n_trials:         30
